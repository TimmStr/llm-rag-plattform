services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: llm-rag-api
    ports:
      - "8080:8080"
    env_file:
      - ../../.env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      VLLM_BASE_URL: http://vllm:8000/v1
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
    depends_on:
      - qdrant
      - vllm
    volumes:
      - ../../:/app
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: llm-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8000:8000"
    ipc: host
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model Qwen/Qwen3-0.6B
      --api-key local-dev-key
      --gpu-memory-utilization "0.65"
volumes:
  qdrant_storage: